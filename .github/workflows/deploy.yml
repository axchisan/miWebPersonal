name: Build & Deploy

# Construye la imagen Docker en los runners de GitHub (recursos de sobra) y la
# publica en GHCR. Luego dispara el deploy en Coolify, que SOLO hace `docker pull`
# + `up`. Asi el servidor nunca compila y deja de colapsar por falta de RAM.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/axchisan/miwebpersonal

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          # Cache de capas entre builds: reconstruir es cuestion de segundos.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trigger-coolify:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy (pull + up)
        env:
          COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_URL" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "::warning::Faltan secrets COOLIFY_URL / COOLIFY_TOKEN. La imagen ya esta en GHCR; dispara el redeploy manualmente en Coolify."
            exit 0
          fi
          # uuid de la app "Mi web Personal" en Coolify. force=true => pull fresco.
          curl -fsS -X GET \
            "$COOLIFY_URL/api/v1/deploy?uuid=zp9al83h220641m1o68czcib&force=true" \
            -H "Authorization: Bearer $COOLIFY_TOKEN"
