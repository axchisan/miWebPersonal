version: '3.8'

services:
  app:
    # La imagen se construye en GitHub Actions (.github/workflows/deploy.yml) y
    # se publica en GHCR. Coolify YA NO compila: solo hace `docker pull` + `up`.
    # Esto evita que el `next build` (intensivo en RAM) cuelgue el servidor.
    image: ghcr.io/axchisan/miwebpersonal:latest
    pull_policy: always
    ports:
      - "3015:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  uploads:
    driver: local
